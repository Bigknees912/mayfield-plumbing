<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' fonts.googleapis.com; font-src fonts.gstatic.com; img-src 'self' data:; script-src 'self' 'unsafe-inline'; connect-src 'self' https://*.supabase.co; frame-ancestors 'none'; base-uri 'self'; form-action 'self'">
<title>Your appointment — Sable</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--paper:#F4F0E9;--paper2:#FBF9F5;--ink:#1F1E1D;--ink2:#5A554D;--muted:#8A8580;--copper:#B87333;--copper-dk:#9a5f28;--line:#E7E0D4;--ok:#2FA84F;}
  *{box-sizing:border-box;}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh;}
  h1,h2,h3{font-family:'Oswald',sans-serif;}
  .wrap{max-width:560px;margin:0 auto;padding:0 20px;}
  header{background:var(--ink);color:#fff;padding:22px 0;}
  header .wrap{display:flex;align-items:center;gap:11px;}
  .logo-badge{width:32px;height:32px;background:#B87333;border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:'Oswald';font-weight:700;font-size:18px;color:#fff;}
  main{padding:34px 0 60px;}
  .card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:26px;box-shadow:0 24px 50px -38px rgba(31,30,29,.4);margin-bottom:16px;}
  .eyebrow{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--copper);margin-bottom:8px;}
  h1.title{font-size:clamp(1.7rem,5vw,2.4rem);line-height:1.05;text-transform:uppercase;letter-spacing:-.01em;margin:0 0 6px;}
  .muted{color:var(--muted);font-size:14px;}
  .row{display:grid;grid-template-columns:auto 1fr;gap:10px 16px;font-size:14.5px;line-height:1.5;margin-top:4px;}
  .row .k{color:var(--muted);}
  .row .v{color:var(--ink);font-weight:600;text-align:right;}
  .stepper{display:flex;flex-direction:column;gap:0;margin:6px 0 2px;}
  .step{display:flex;align-items:flex-start;gap:14px;position:relative;padding-bottom:20px;}
  .step:last-child{padding-bottom:0;}
  .step .dot{width:26px;height:26px;flex:0 0 26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;z-index:1;}
  .step .line{position:absolute;left:12.5px;top:26px;bottom:0;width:2px;background:var(--line);}
  .step:last-child .line{display:none;}
  .step.done .dot{background:var(--copper);color:#fff;}
  .step.done .line{background:var(--copper);}
  .step.current .dot{background:var(--copper);color:#fff;box-shadow:0 0 0 4px rgba(184,115,51,.18);}
  .step.todo .dot{background:#EEE9E0;color:#B4AEA4;}
  .step .lbl{font-size:15px;font-weight:600;padding-top:2px;}
  .step.todo .lbl{color:var(--muted);font-weight:500;}
  .tech{display:flex;align-items:center;gap:13px;}
  .tech .av{width:46px;height:46px;flex:0 0 46px;border-radius:50%;background:#EDE5D8;color:var(--copper-dk);display:flex;align-items:center;justify-content:center;font-family:'Oswald';font-weight:600;font-size:18px;}
  .pill{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;padding:5px 12px;border-radius:999px;}
  .pill.ok{background:#EAF5EC;color:var(--ok);}
  .pill.copper{background:rgba(184,115,51,.12);color:var(--copper-dk);}
  .loading,.err{text-align:center;padding:60px 20px;color:var(--muted);}
  a.tel{color:var(--copper);font-weight:600;}
  footer{text-align:center;font-size:12px;color:var(--muted);padding:0 0 40px;}
</style>
</head>
<body>
<header>
  <div class="wrap"><span class="logo-badge">S</span><span style="font-family:'Oswald';font-weight:600;font-size:20px;">Sable</span></div>
</header>
<main>
  <div class="wrap">
    <div id="loading" class="loading">Loading your appointment…</div>
    <div id="error" class="err" style="display:none;">
      <h2 style="font-size:1.4rem;text-transform:uppercase;margin:0 0 8px;">Link not found</h2>
      <p class="muted">This appointment link isn't valid or has expired. Check the link in your text message, or call your service provider directly.</p>
    </div>
    <div id="content" style="display:none;"></div>
  </div>
</main>
<footer>Powered by Sable · Your details are private to this link.</footer>

<script>
  // Public, safe-to-embed Supabase keys (same as data-request.html) - the
  // job-status function only ever returns the single job matching the exact
  // token in the URL, so this key grants nothing beyond that.
  var SUPABASE_URL = 'https://umtoseyxvszdxbuvuyuk.supabase.co';
  var SUPABASE_PUBLISHABLE_KEY = 'sb_publishable_DzyllacMgWg-TUMMO2-c2Q_YYzaS-lM';

  function esc(s){ return String(s == null ? '' : s).replace(/[&<>"']/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); }
  function initials(name){ if(!name) return '?'; return name.trim().split(/\s+/).slice(0,2).map(function(w){return w[0];}).join('').toUpperCase(); }
  function money(n){ if(n == null) return ''; return '$' + Number(n).toLocaleString(); }
  function fmtDate(d){ if(!d) return null; try { return new Date(d + 'T00:00:00').toLocaleDateString(undefined,{weekday:'long',month:'long',day:'numeric'}); } catch(e){ return d; } }

  var params = new URLSearchParams(location.search);
  var token = params.get('t') || params.get('token') || '';

  function show(id){ ['loading','error','content'].forEach(function(x){ document.getElementById(x).style.display = x===id ? (x==='content'?'block':'block') : 'none'; }); }

  function render(d){
    var order = ['booked','en_route','in_progress','completed'];
    var curIdx = order.indexOf(d.status);
    var cancelled = d.status === 'cancelled';
    var stepsHtml = (d.steps||[]).map(function(s){
      var idx = order.indexOf(s.key);
      var cls = cancelled ? 'todo' : (idx < curIdx ? 'done' : idx === curIdx ? 'current' : 'todo');
      var mark = (cls==='done') ? '&#10003;' : (idx+1);
      return '<div class="step '+cls+'"><span class="dot">'+mark+'</span><span class="line"></span><span class="lbl">'+esc(s.label)+'</span></div>';
    }).join('');

    var dateLine = fmtDate(d.scheduledDate);
    var whenHtml = '';
    if (dateLine || d.scheduledWindow) {
      whenHtml = '<div class="row"><span class="k">Appointment</span><span class="v">'+esc([dateLine, d.scheduledWindow].filter(Boolean).join(' · '))+'</span></div>';
    }

    var techHtml = '';
    if (d.technician) {
      techHtml = '<div class="card"><div class="eyebrow">Your technician</div><div class="tech"><span class="av">'+esc(initials(d.technician))+'</span><div><div style="font-size:16px;font-weight:700;">'+esc(d.technician)+'</div><div class="muted">On the way to you when the status shows en route.</div></div></div></div>';
    }

    var priceHtml = '';
    if (d.isCallback) {
      priceHtml = '<div class="row"><span class="k">Estimate</span><span class="v"><span class="pill copper">No charge · follow-up visit</span></span></div>';
    } else if (d.priceLow != null || d.priceHigh != null) {
      var p = (d.priceLow!=null && d.priceHigh!=null && d.priceLow!==d.priceHigh) ? (money(d.priceLow)+'–'+money(d.priceHigh)) : money(d.priceHigh!=null?d.priceHigh:d.priceLow);
      priceHtml = '<div class="row"><span class="k">Estimate</span><span class="v">'+esc(p)+'</span></div>';
    }

    var invoiceHtml = '';
    if (d.invoice) {
      invoiceHtml = '<div class="card"><div class="eyebrow">Invoice</div>'
        + '<div class="row"><span class="k">Invoice #</span><span class="v">'+esc(d.invoice.invoice_no)+'</span></div>'
        + '<div class="row"><span class="k">Amount</span><span class="v">'+esc(money(d.invoice.amount))+'</span></div>'
        + '<div class="row"><span class="k">Status</span><span class="v">'+(d.invoice.paid ? '<span class="pill ok">&#10003; Paid</span>' : '<span class="pill copper">Due</span>')+'</span></div>'
        + '</div>';
    }

    var hero = cancelled
      ? '<span class="pill copper">This appointment was cancelled</span>'
      : (d.status==='completed' ? '<span class="pill ok">&#10003; Job complete</span>' : '<span class="pill copper">'+esc((d.steps.find(function(s){return s.key===d.status;})||{}).label||'Booked')+'</span>');

    document.getElementById('content').innerHTML =
      '<div class="card">'
      + '<div class="eyebrow">'+esc(d.company)+'</div>'
      + '<h1 class="title">'+(d.customerFirstName ? esc('Hi '+d.customerFirstName+',') : 'Your appointment')+'</h1>'
      + '<p class="muted" style="margin:0 0 16px;">Here\'s the latest on your '+esc(d.service||'service')+'.</p>'
      + '<div style="margin-bottom:16px;">'+hero+'</div>'
      + '<div class="stepper">'+stepsHtml+'</div>'
      + '</div>'
      + '<div class="card"><div class="eyebrow">Details</div>'
        + '<div class="row"><span class="k">Service</span><span class="v">'+esc(d.service||'—')+'</span></div>'
        + (d.address ? '<div class="row"><span class="k">Address</span><span class="v">'+esc(d.address)+'</span></div>' : '')
        + whenHtml
        + priceHtml
      + '</div>'
      + techHtml
      + invoiceHtml;
    show('content');
  }

  if (!token) { show('error'); }
  else {
    fetch(SUPABASE_URL + '/functions/v1/job-status?t=' + encodeURIComponent(token), {
      headers: { apikey: SUPABASE_PUBLISHABLE_KEY, Authorization: 'Bearer ' + SUPABASE_PUBLISHABLE_KEY }
    })
    .then(function(r){ if(!r.ok) throw new Error('nf'); return r.json(); })
    .then(function(d){ if(d.error) throw new Error(d.error); render(d); })
    .catch(function(){ show('error'); });
  }
</script>
</body>
</html>
