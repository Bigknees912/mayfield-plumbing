<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sable — hero animation</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

  :root {
    --bg: #F5F4ED;
    --ink: #1F1E1D;
    --sub: #6B7280;
    --border: #E7E5E1;
    --accent: #DA7756;
    --accent-soft: #F3E3DB;
    --gold: #E0A94E;
    --green: #1E9E5A;
    --green-soft: #E5F5EC;
    --ease-smooth: cubic-bezier(0.22, 1, 0.36, 1);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #262624;
      --ink: #F0EEE8;
      --sub: #A39E92;
      --border: #3D3B37;
      --accent: #E08D6B;
      --accent-soft: #3A2E27;
      --gold: #C99544;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 48px 20px;
    position: relative;
    overflow: hidden;
  }

  .bg-blobs { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
  .blob { position: absolute; border-radius: 50%; filter: blur(80px); will-change: transform; }
  .blob.b1 { width: 480px; height: 480px; top: -120px; left: -140px; background: radial-gradient(circle, var(--accent) 0%, transparent 72%); opacity: 0.4; animation: floatBlob1 24s var(--ease-smooth) infinite; }
  .blob.b2 { width: 400px; height: 400px; bottom: -160px; right: -120px; background: radial-gradient(circle, var(--gold) 0%, transparent 72%); opacity: 0.32; animation: floatBlob2 28s var(--ease-smooth) infinite; }
  @keyframes floatBlob1 { 0%, 100% { transform: translate(0, 0) scale(1); } 50% { transform: translate(50px, 40px) scale(1.08); } }
  @keyframes floatBlob2 { 0%, 100% { transform: translate(0, 0) scale(1); } 50% { transform: translate(-40px, -30px) scale(0.94); } }

  .panel { position: relative; z-index: 2; }

  @media (prefers-reduced-motion: reduce) {
    * { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; }
  }

  /* ---------- Panel ---------- */
  .panel {
    width: 100%;
    max-width: 560px;
    background: #fff;
    border-radius: 20px;
    border: 1px solid #ECEAE5;
    box-shadow: 0 24px 60px -24px rgba(31,30,29,0.22), 0 4px 16px rgba(31,30,29,0.06);
    padding: 22px 22px 26px;
    overflow: hidden;
  }

  .panel-header {
    display: flex;
    align-items: center;
    gap: 11px;
    margin-bottom: 22px;
  }
  .logo-mark {
    width: 38px;
    height: 38px;
    border-radius: 10px;
    background: var(--ink);
    color: #fff;
    font-weight: 800;
    font-size: 17px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    letter-spacing: -0.5px;
  }
  .company-name { font-size: 15.5px; font-weight: 700; color: var(--ink); line-height: 1.25; }
  .company-sub { font-size: 12px; color: var(--sub); font-weight: 500; }

  /* ---------- Tracker ---------- */
  .tracker {
    position: relative;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 22px;
    padding: 0 2px;
  }
  .tracker-line-bg {
    position: absolute;
    left: 18px; right: 18px; top: 15px;
    height: 2px;
    background: #EAE8E3;
    border-radius: 2px;
    z-index: 0;
  }
  .tracker-line-fill {
    position: absolute;
    left: 18px; top: 15px;
    height: 2px;
    width: 0%;
    background: var(--accent);
    border-radius: 2px;
    z-index: 1;
    transition: width 0.6s var(--ease-smooth);
  }
  .node {
    position: relative;
    z-index: 2;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #fff;
    border: 2px solid #DCD9D3;
    color: #B4B0A8;
    font-size: 11px;
    font-weight: 700;
    transition: background 0.35s ease, border-color 0.35s ease, color 0.35s ease, transform 0.35s ease;
  }
  .node svg { width: 14px; height: 14px; display: block; }
  .node.is-done {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .node.is-active {
    background: #fff;
    border-color: var(--accent);
    color: var(--accent);
    transform: scale(1.08);
  }
  .node.is-active::after {
    content: '';
    position: absolute;
    inset: -6px;
    border-radius: 50%;
    border: 2px solid var(--accent);
    opacity: 0.55;
    animation: pulseRing 1.6s ease-out infinite;
  }
  @keyframes pulseRing {
    0% { transform: scale(0.85); opacity: 0.55; }
    70% { transform: scale(1.35); opacity: 0; }
    100% { transform: scale(1.35); opacity: 0; }
  }

  /* ---------- Cards viewport ---------- */
  .cards-viewport {
    position: relative;
    overflow: hidden;
    border-radius: 4px;
  }
  .cards-track {
    display: flex;
    gap: 12px;
    transition: transform 0.55s var(--ease-smooth);
  }
  .step-card {
    flex: 0 0 calc(50% - 6px);
    min-width: calc(50% - 6px);
    background: #FAFAF8;
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 14px 15px;
    min-height: 178px;
    display: flex;
    flex-direction: column;
  }
  .step-card-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }
  .step-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.7px;
    color: var(--sub);
    text-transform: uppercase;
  }
  .step-badge {
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--green);
    display: flex; align-items: center; justify-content: center;
    opacity: 0;
    transform: scale(0.5);
    transition: opacity 0.25s ease, transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .step-badge.show { opacity: 1; transform: scale(1); }
  .step-badge svg { width: 10px; height: 10px; stroke: #fff; }
  .step-heading {
    font-size: 13.5px;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 10px;
    line-height: 1.3;
  }
  .step-body { flex: 1; font-size: 12px; color: var(--ink); }

  /* ---- Step 1: incoming call ---- */
  .call-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .call-avatar {
    width: 26px; height: 26px; border-radius: 50%;
    background: #EFECE6; color: var(--sub);
    font-size: 10px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .call-who { min-width: 0; }
  .call-name { font-size: 12px; font-weight: 700; color: var(--ink); }
  .call-num { font-size: 10.5px; color: var(--sub); }
  .call-ping {
    margin-left: auto;
    display: flex; align-items: center; gap: 4px;
    font-size: 9.5px; font-weight: 700; color: var(--green);
    text-transform: uppercase; letter-spacing: 0.4px;
  }
  .call-ping .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: blink 1.1s ease-in-out infinite; }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.25; } }

  .transcript-line {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 10px;
    font-size: 11.5px;
    color: var(--ink);
    line-height: 1.45;
    min-height: 34px;
  }
  .cursor {
    display: inline-block;
    width: 1.5px;
    height: 11px;
    background: var(--ink);
    margin-left: 1px;
    vertical-align: -1px;
    animation: blink 0.9s step-end infinite;
  }
  .ai-status {
    margin-top: 9px;
    display: flex; align-items: center; gap: 6px;
    font-size: 10.5px; color: var(--sub); font-weight: 600;
  }
  .ai-status .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: blink 1s ease-in-out infinite; }

  /* ---- Step 2: chat thread ---- */
  .pill-tag {
    display: inline-block;
    background: #EFECE6; color: var(--sub);
    font-size: 10px; font-weight: 600;
    border-radius: 20px; padding: 3px 9px;
    margin-bottom: 10px;
  }
  .typing-indicator { display: flex; gap: 3px; padding: 8px 0 0 2px; }
  .typing-indicator span {
    width: 5px; height: 5px; border-radius: 50%;
    background: #C7C3BC;
    animation: bounceDot 1.1s ease-in-out infinite;
  }
  .typing-indicator span:nth-child(2) { animation-delay: 0.15s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounceDot { 0%, 60%, 100% { transform: translateY(0); opacity: 0.5; } 30% { transform: translateY(-3px); opacity: 1; } }
  .reply-bubble {
    background: var(--green-soft);
    border: 1px solid #C9E8D5;
    border-radius: 10px 10px 10px 3px;
    padding: 9px 11px;
    font-size: 11.5px;
    color: #14532D;
    line-height: 1.45;
    opacity: 0;
    transform: translateY(4px);
    transition: opacity 0.35s ease, transform 0.35s ease;
  }
  .reply-bubble.show { opacity: 1; transform: translateY(0); }

  /* ---- Step 3: lead card ---- */
  .lead-tag {
    display: inline-block;
    background: var(--accent); color: #fff;
    font-size: 9.5px; font-weight: 700; letter-spacing: 0.5px;
    border-radius: 5px; padding: 3px 7px;
    margin-bottom: 10px;
  }
  .lead-field { display: flex; gap: 8px; margin-bottom: 6px; opacity: 0; transform: translateX(-4px); transition: opacity 0.3s ease, transform 0.3s ease; }
  .lead-field.show { opacity: 1; transform: translateX(0); }
  .lead-k { font-size: 10px; color: var(--sub); font-weight: 600; width: 52px; flex-shrink: 0; padding-top: 1px; }
  .lead-v { font-size: 11.5px; color: var(--ink); font-weight: 600; }

  /* ---- Step 4: slots ---- */
  .slots-row { display: flex; gap: 6px; margin-bottom: 12px; }
  .slot {
    flex: 1;
    text-align: center;
    font-size: 10.5px; font-weight: 700;
    color: var(--sub);
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 2px;
    transition: background 0.3s ease, border-color 0.3s ease, color 0.3s ease, transform 0.3s ease;
  }
  .slot.is-booked {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    transform: scale(1.04);
  }
  .booking-summary {
    font-size: 11.5px; color: var(--ink); font-weight: 600;
    background: #fff; border: 1px solid var(--border); border-radius: 8px;
    padding: 8px 10px;
    opacity: 0; transform: translateY(4px);
    transition: opacity 0.3s ease, transform 0.3s ease;
  }
  .booking-summary.show { opacity: 1; transform: translateY(0); }
  .booking-summary .sub { color: var(--sub); font-weight: 500; font-size: 10.5px; margin-top: 1px; }

  /* ---- Step 5: confirmation ---- */
  .confirm-bubble {
    background: var(--green-soft);
    border: 1px solid #C9E8D5;
    border-radius: 10px 10px 10px 3px;
    padding: 9px 11px;
    font-size: 11.5px;
    color: #14532D;
    font-weight: 600;
    line-height: 1.4;
    margin-bottom: 10px;
    opacity: 0; transform: translateY(4px);
    transition: opacity 0.35s ease, transform 0.35s ease;
  }
  .confirm-bubble.show { opacity: 1; transform: translateY(0); }
  .reminder-row {
    display: flex; align-items: center; justify-content: space-between;
    background: #fff; border: 1px solid var(--border); border-radius: 8px;
    padding: 8px 10px;
    opacity: 0; transform: translateY(4px);
    transition: opacity 0.35s ease, transform 0.35s ease;
  }
  .reminder-row.show { opacity: 1; transform: translateY(0); }
  .reminder-row span { font-size: 11px; font-weight: 600; color: var(--ink); }
  .toggle {
    width: 30px; height: 17px; border-radius: 10px;
    background: var(--border);
    position: relative;
    transition: background 0.3s ease;
    flex-shrink: 0;
  }
  .toggle::after {
    content: '';
    position: absolute; top: 2px; left: 2px;
    width: 13px; height: 13px; border-radius: 50%;
    background: #fff;
    box-shadow: 0 1px 2px rgba(0,0,0,0.2);
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .toggle.is-on { background: var(--green); }
  .toggle.is-on::after { transform: translateX(13px); }

  /* ---- Step 6: review ---- */
  .review-msg {
    background: #fff; border: 1px solid var(--border); border-radius: 10px;
    padding: 9px 11px; font-size: 11.5px; color: var(--ink); line-height: 1.45;
    margin-bottom: 10px;
  }
  .stars { display: flex; gap: 3px; }
  .stars svg {
    width: 15px; height: 15px;
    fill: #E7E5E1;
    transition: fill 0.25s ease, transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    transform: scale(0.7);
  }
  .stars svg.lit { fill: var(--accent); transform: scale(1); }

  @media (max-width: 420px) {
    .panel { padding: 18px 16px 20px; }
    .step-card { min-height: 196px; padding: 12px; }
    .lead-k { width: 44px; }
    .slot { font-size: 9.5px; padding: 6px 1px; }
  }
</style>
</head>
<body>

  <div class="bg-blobs">
    <div class="blob b1"></div>
    <div class="blob b2"></div>
  </div>

  <div class="panel">
    <div class="panel-header">
      <div class="logo-mark">A</div>
      <div>
        <div class="company-name">Apex Plumbing</div>
        <div class="company-sub">AI Receptionist</div>
      </div>
    </div>

    <div class="tracker" id="tracker">
      <div class="tracker-line-bg"></div>
      <div class="tracker-line-fill" id="trackerFill"></div>
      <!-- 6 nodes injected by JS -->
    </div>

    <div class="cards-viewport">
      <div class="cards-track" id="cardsTrack"></div>
    </div>
  </div>

<script>
(function () {
  "use strict";

  var reduceMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  // ---------- Icons ----------
  var ICON = {
    check: '<svg viewBox="0 0 24 24" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg>',
    phone: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.362 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>',
    spark: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v4M12 17v4M3 12h4M17 12h4M5.6 5.6l2.8 2.8M15.6 15.6l2.8 2.8M18.4 5.6l-2.8 2.8M8.4 15.6l-2.8 2.8"/></svg>',
    user: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg>',
    calendar: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M16 3v4M8 3v4M3 10h18"/><path d="M9 15l2 2 4-4"/></svg>',
    bell: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 0 0-12 0c0 4-2 5-2 7h16c0-2-2-3-2-7"/><path d="M10.3 21a2 2 0 0 0 3.4 0"/></svg>',
    star: '<svg viewBox="0 0 24 24"><path d="M12 2.5l2.9 6.4 6.9.7-5.2 4.7 1.6 6.8L12 17.8 5.8 21.1l1.6-6.8-5.2-4.7 6.9-.7z"/></svg>'
  };

  var STEP_ICON = ['phone', 'spark', 'user', 'calendar', 'bell', 'star'];

  // ---------- Tracker ----------
  var tracker = document.getElementById('tracker');
  var trackerFill = document.getElementById('trackerFill');
  var nodes = [];
  for (var i = 0; i < 6; i++) {
    var node = document.createElement('div');
    node.className = 'node';
    node.innerHTML = ICON[STEP_ICON[i]];
    tracker.appendChild(node);
    nodes.push(node);
  }

  function setTrackerState(activeIndex, resetting) {
    // activeIndex: 0-based index of the active step. Everything before it
    // is "done" (filled node + line segment); everything after is upcoming.
    for (var i = 0; i < nodes.length; i++) {
      nodes[i].classList.remove('is-done', 'is-active');
      if (i < activeIndex) {
        nodes[i].innerHTML = ICON.check;
        nodes[i].classList.add('is-done');
      } else if (i === activeIndex) {
        nodes[i].innerHTML = ICON[STEP_ICON[i]];
        nodes[i].classList.add('is-active');
      } else {
        nodes[i].innerHTML = ICON[STEP_ICON[i]];
      }
    }
    var pct = (activeIndex / 5) * 100; // line fills up to (not through) the active node
    if (resetting) trackerFill.style.transition = 'none';
    trackerFill.style.width = pct + '%';
    if (resetting) {
      void trackerFill.offsetWidth;
      trackerFill.style.transition = '';
    }
  }

  function fillLineThrough(activeIndex) {
    // Called the instant a step completes: extends the fill past the node
    // that just finished, toward the next one.
    var pct = ((activeIndex + 1) / 5) * 100;
    trackerFill.style.width = Math.min(pct, 100) + '%';
  }

  // ---------- Card content builders ----------
  // Each returns { render: fn(el), play: fn(el) -> Promise } where render
  // draws the static/initial DOM and play runs the step's animation,
  // resolving once it's "complete" (checkmark should appear).

  function sleep(ms) {
    if (reduceMotion) ms = Math.min(ms, 30);
    return new Promise(function (resolve) { setTimeout(resolve, ms); });
  }

  function typeInto(el, text, speed) {
    return new Promise(function (resolve) {
      if (reduceMotion) { el.textContent = text; resolve(); return; }
      var i = 0;
      var cursor = document.createElement('span');
      cursor.className = 'cursor';
      function tick() {
        if (i <= text.length) {
          el.textContent = text.slice(0, i);
          el.appendChild(cursor);
          i++;
          setTimeout(tick, speed);
        } else {
          resolve();
        }
      }
      tick();
    });
  }

  var STEP_DEFS = [
    {
      label: 'STEP 1',
      heading: 'Call comes in',
      build: function (body) {
        body.innerHTML =
          '<div class="call-row">' +
            '<div class="call-avatar">MW</div>' +
            '<div class="call-who">' +
              '<div class="call-name">Marcus Webb</div>' +
              '<div class="call-num">(403) 555-0148</div>' +
            '</div>' +
            '<div class="call-ping"><span class="dot"></span>LIVE</div>' +
          '</div>' +
          '<div class="transcript-line"><span class="ttext"></span></div>' +
          '<div class="ai-status"><span class="dot"></span>AI answering…</div>';
        return {
          textEl: body.querySelector('.ttext')
        };
      },
      play: function (refs) {
        return typeInto(refs.textEl, "Hi, my basement's flooding, I need someone today.", 34)
          .then(function () { return sleep(500); });
      }
    },
    {
      label: 'STEP 2',
      heading: 'AI answers and quotes',
      build: function (body) {
        body.innerHTML =
          '<div class="pill-tag">Marcus Webb · just now</div>' +
          '<div class="typing-indicator"><span></span><span></span><span></span></div>' +
          '<div class="reply-bubble"></div>';
        return {
          typing: body.querySelector('.typing-indicator'),
          bubble: body.querySelector('.reply-bubble')
        };
      },
      play: function (refs) {
        return sleep(750).then(function () {
          refs.typing.style.display = 'none';
          refs.bubble.textContent = "Sounds like a sump pump failure — I can get someone out today, $220–$340. Next opening is 11:00 AM. Want me to book it?";
          refs.bubble.classList.add('show');
          return sleep(450);
        });
      }
    },
    {
      label: 'STEP 3',
      heading: 'Lead captured',
      build: function (body) {
        body.innerHTML =
          '<div class="lead-tag">NEW LEAD</div>' +
          '<div class="lead-field"><div class="lead-k">Name</div><div class="lead-v">Marcus Webb</div></div>' +
          '<div class="lead-field"><div class="lead-k">Job</div><div class="lead-v">Sump Pump Failure</div></div>' +
          '<div class="lead-field"><div class="lead-k">Address</div><div class="lead-v"><span class="ttext"></span></div></div>' +
          '<div class="lead-field"><div class="lead-k">Estimate</div><div class="lead-v">$220–$340</div></div>';
        return {
          fields: body.querySelectorAll('.lead-field'),
          addr: body.querySelector('.ttext')
        };
      },
      play: function (refs) {
        var fields = refs.fields;
        return sleep(150)
          .then(function () { fields[0].classList.add('show'); return sleep(180); })
          .then(function () { fields[1].classList.add('show'); return sleep(180); })
          .then(function () { fields[2].classList.add('show'); return typeInto(refs.addr, '214 Elbow Dr SW', 22); })
          .then(function () { fields[3].classList.add('show'); return sleep(450); });
      }
    },
    {
      label: 'STEP 4',
      heading: 'Qualified and booked',
      build: function (body) {
        body.innerHTML =
          '<div class="slots-row">' +
            '<div class="slot">8 AM</div>' +
            '<div class="slot">9 AM</div>' +
            '<div class="slot">10 AM</div>' +
            '<div class="slot" data-booked>11 AM</div>' +
          '</div>' +
          '<div class="booking-summary">Sump Pump Failure<div class="sub">Marcus Webb</div></div>';
        return {
          slot: body.querySelector('[data-booked]'),
          summary: body.querySelector('.booking-summary')
        };
      },
      play: function (refs) {
        return sleep(350).then(function () {
          refs.slot.classList.add('is-booked');
          return sleep(250);
        }).then(function () {
          refs.summary.classList.add('show');
          return sleep(450);
        });
      }
    },
    {
      label: 'STEP 5',
      heading: 'Confirmed and reminded',
      build: function (body) {
        body.innerHTML =
          '<div class="confirm-bubble">You’re booked for today at 11:00 AM.</div>' +
          '<div class="reminder-row"><span>Reminder scheduled</span><div class="toggle"></div></div>';
        return {
          bubble: body.querySelector('.confirm-bubble'),
          row: body.querySelector('.reminder-row'),
          toggle: body.querySelector('.toggle')
        };
      },
      play: function (refs) {
        return sleep(200).then(function () {
          refs.bubble.classList.add('show');
          return sleep(350);
        }).then(function () {
          refs.row.classList.add('show');
          return sleep(250);
        }).then(function () {
          refs.toggle.classList.add('is-on');
          return sleep(450);
        });
      }
    },
    {
      label: 'STEP 6',
      heading: 'Review requested',
      build: function (body) {
        body.innerHTML =
          '<div class="review-msg">Thanks for choosing Apex Plumbing, Marcus! Mind leaving us a quick review?</div>' +
          '<div class="stars">' +
            ICON.star.replace('<svg ', '<svg class="s1" ') +
            ICON.star.replace('<svg ', '<svg class="s2" ') +
            ICON.star.replace('<svg ', '<svg class="s3" ') +
            ICON.star.replace('<svg ', '<svg class="s4" ') +
            ICON.star.replace('<svg ', '<svg class="s5" ') +
          '</div>';
        return { stars: body.querySelectorAll('.stars svg') };
      },
      play: function (refs) {
        var p = Promise.resolve();
        Array.prototype.forEach.call(refs.stars, function (star) {
          p = p.then(function () { return sleep(120); }).then(function () { star.classList.add('lit'); });
        });
        return p.then(function () { return sleep(500); });
      }
    }
  ];

  // ---------- Build the card rail: [S6, S1, S2, S3, S4, S5, S6, S1] ----------
  var track = document.getElementById('cardsTrack');
  var railOrder = [5, 0, 1, 2, 3, 4, 5, 0]; // indexes into STEP_DEFS
  var railCards = railOrder.map(function (stepIdx, railPos) {
    var card = document.createElement('div');
    card.className = 'step-card';

    var top = document.createElement('div');
    top.className = 'step-card-top';
    var label = document.createElement('div');
    label.className = 'step-label';
    label.textContent = STEP_DEFS[stepIdx].label;
    var badge = document.createElement('div');
    badge.className = 'step-badge';
    badge.innerHTML = ICON.check;
    top.appendChild(label);
    top.appendChild(badge);

    var heading = document.createElement('div');
    heading.className = 'step-heading';
    heading.textContent = STEP_DEFS[stepIdx].heading;

    var body = document.createElement('div');
    body.className = 'step-body';

    card.appendChild(top);
    card.appendChild(heading);
    card.appendChild(body);
    track.appendChild(card);

    return { el: card, badge: badge, body: body, stepIdx: stepIdx, railPos: railPos, refs: null };
  });

  function resetCard(rc) {
    rc.badge.classList.remove('show');
    rc.refs = STEP_DEFS[rc.stepIdx].build(rc.body);
  }

  function setTrackPosition(pos, instant) {
    if (instant) track.style.transition = 'none';
    track.style.transform = 'translateX(calc(-' + pos + ' * (50% + 6px)))';
    if (instant) {
      void track.offsetWidth;
      track.style.transition = '';
    }
  }

  // ---------- Driver ----------
  // pos 0..5: showing railCards[pos] (just completed) + railCards[pos+1] (active)
  // active step number = pos, mapped via railOrder[pos+1] -> STEP_DEFS index
  function runLoop() {
    var pos = 0;
    resetCard(railCards[0]); // S6 clone, shown as the "just completed" card
    railCards[0].badge.classList.add('show');
    resetCard(railCards[1]); // S1, first active card
    setTrackerState(0, true);
    setTrackPosition(0, true);

    function step() {
      var activeCard = railCards[pos + 1];
      var activeStepIdx = activeCard.stepIdx; // 0..5
      setTrackerState(activeStepIdx, false);

      STEP_DEFS[activeStepIdx].play(activeCard.refs).then(function () {
        activeCard.badge.classList.add('show');
        fillLineThrough(activeStepIdx);
        return sleep(650);
      }).then(function () {
        pos++;
        // Prep the card that will become the new "active" (pos+1), one
        // rail-slot ahead, so its content starts fresh right as it scrolls in.
        var nextActive = railCards[pos + 1];
        if (nextActive) resetCard(nextActive);
        setTrackPosition(pos, false);
        return sleep(600); // let the slide transition finish
      }).then(function () {
        if (pos >= 6) {
          // We've slid onto the clone pair (S6, S1) at rail positions 6,7 -
          // pixel-identical to positions 0,1, so snap back with no
          // transition for a seamless wrap, then keep looping.
          pos = 0;
          setTrackPosition(0, true);
          setTrackerState(0, true);
          resetCard(railCards[0]);
          railCards[0].badge.classList.add('show');
          resetCard(railCards[1]);
        }
        step();
      });
    }
    step();
  }

  runLoop();
})();
</script>
</body>
</html>
